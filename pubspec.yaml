name: travel_organizer
description: "Travel Organizer Offline - App per organizzare viaggi senza connessione"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  provider: ^6.1.2
  sqflite: ^2.3.3+1
  sqflite_common_ffi_web: ^0.4.5+2
  path: ^1.9.0
  uuid: ^4.4.0
  intl: ^0.19.0
  fl_chart: ^0.70.0
  # Condivisione tramite il menu nativo del sistema (esporta viaggio).
  share_plus: ^10.0.0
  # Calendario mensile con marker per viaggi e attività.
  table_calendar: ^3.1.2
  # Selezione/scatto di foto per il diario di viaggio.
  image_picker: ^1.1.2
  # Notifiche locali (promemoria attività) e gestione fusi orari.
  flutter_local_notifications: ^18.0.1
  timezone: ^0.9.4

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  # Permette di eseguire SQLite nei test su desktop/CI (sqflite via FFI).
  sqflite_common_ffi: ^2.3.3

flutter:
  uses-material-design: true
